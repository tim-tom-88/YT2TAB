<!DOCTYPE html>
<html>
  <head>
    <style>
            * {
        box-sizing: border-box;
      }
        html, body {
          width: 300px;
          height: 100%;
          font-family:'Courier New', Courier, monospace;
          background-color: #e4e4e4;
          color: rgb(0, 26, 49);
          border-radius: 5px;
        }
        img {
          display: block;
          margin-left: auto;
          margin-right: auto;
          width: 40%;
}
        h1 {
          text-align: center;
        }
        button {
          background-color: #000000; /* Green */
          border: none;
          color: white;
          padding: 10px 32px;
          text-align: center;
          text-decoration: none;
          display: inline-block;
          font-size: 16px;
          cursor: pointer;
          border-radius: 5px;
        }
        .radio-container {
          width: 95%;
          border: 1px solid #000;
          padding: 6px;
          margin-bottom: 6px;
          border-radius: 5px;
        }
      </style>
    </style>
  </head>
  <body>
    <img src="./images/Bass-icon.png">
    <h1>Set Tab Type</h1>
    <form id="tabTypeForm">
      <div class="radio-container">
        <input type="radio" id="official" name="tabType" value="900">
        <label for="official">Official</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="chords" name="tabType" value="300">
        <label for="chords">Chords</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="tab" name="tabType" value="200">
        <label for="tab">Tab</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="guitarPro" name="tabType" value="500">
        <label for="guitarPro">Guitar Pro</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="power" name="tabType" value="600">
        <label for="power">Power</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="bass" name="tabType" value="400">
        <label for="bass">Bass</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="drums" name="tabType" value="700">
        <label for="drums">Drums</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="video" name="tabType" value="100">
        <label for="video">Video</label>
      </div>
      <div class="radio-container">
        <input type="radio" id="ukulele" name="tabType" value="800">
        <label for="ukulele">Ukulele</label>
      </div>
      <button type="submit">Set</button>
    </form>
    <script src="popup.js"></script>
  </body>
</html>
